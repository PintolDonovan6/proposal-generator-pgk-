<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>PNG Proposal Generator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h1>PNG Proposal Generator</h1>

<label>Client Name</label>
<input type="text" id="clientName">

<label>Project Details</label>
<textarea id="projectDetails"></textarea>

<label>Pricing Tier</label>
<select id="pricingTier">

<option value="1500">Starter – PGK 1,500</option>
<option value="3500">Professional – PGK 3,500</option>
<option value="7000">Enterprise – PGK 7,000</option>

</select>

<button onclick="generatePDF()">Generate Proposal</button>

<script src="script.js"></script>

</body>
</html>
