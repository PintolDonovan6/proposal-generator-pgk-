<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Proposal Generator (PNG)</title>
<style>
body { font-family: Arial, sans-serif; background: #f4f4f4; }
.container { width: 700px; margin: 40px auto; padding: 30px; background: white; box-shadow: 0 0 15px rgba(0,0,0,0.1); border-radius: 10px; }
h1 { text-align: center; color: #003366; margin-bottom: 25px; }
label { display: block; margin-top: 15px; font-weight: bold; }
input, textarea, select { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; }
textarea { min-height: 60px; }
button { margin-top: 20px; padding: 15px; width: 100%; background: #003366; color: white; border: none; cursor: pointer; font-size: 16px; border-radius: 5px; transition: background 0.3s; }
button:hover { background: #0055aa; }
#status { margin-top: 15px; color: green; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="container">
<h1>AI Proposal Generator (PNG)</h1>

<label>Proposal Number</label>
<input type="text" id="proposalNumber" readonly value="PROP-001">

<label>Date</label>
<input type="text" id="proposalDate" readonly value="">

<label>Client Name</label>
<input type="text" id="clientName" placeholder="Enter client name">

<label>Project Title</label>
<input type="text" id="projectTitle" placeholder="Enter project title">

<label>Instruction / Brief</label>
<textarea id="instruction" placeholder="Enter a brief instruction for the proposal"></textarea>

<label>Pricing Tier</label>
<select id="pricingTier">
<option value="1500">Starter – PGK 1,500.00</option>
<option value="3500">Professional – PGK 3,500.00</option>
<option value="7000">Enterprise – PGK 7,000.00</option>
</select>

<button onclick="generateProposal()">Generate Proposal PDF</button>
<p id="status"></p>
</div>

<script>
document.getElementById('proposalDate').value = new Date().toLocaleDateString('en-PG');

async function fetchLogo(clientName){
  let domain = clientName.toLowerCase().replace(/\s+/g,'') + ".gov.pg";
  let url = `https://logo.clearbit.com/${domain}`;
  return new Promise(resolve=>{
    let img = new Image(); img.src=url; img.crossOrigin="Anonymous";
    img.onload=()=>resolve(url);
    img.onerror=()=>resolve("logos/DefaultLogo.png");
  });
}

async function generateProposal(){
  const { jsPDF } = window.jspdf;
  const client = document.getElementById("clientName").value;
  const projectTitle = document.getElementById("projectTitle").value;
  const instruction = document.getElementById("instruction").value;
  const price = parseFloat(document.getElementById("pricingTier").value).toLocaleString('en-PG',{style:'currency',currency:'PGK'});
  const proposalNumber = document.getElementById("proposalNumber").value;
  const proposalDate = document.getElementById("proposalDate").value;

  if(!client || !projectTitle || !instruction){
    alert("Please fill all fields"); return;
  }

  document.getElementById("status").innerText="Generating proposal, please wait...";

  let logoUrl = await fetchLogo(client);

  // Call your deployed Netlify function
  const response = await fetch("https://YOUR_NETLIFY_SITE.netlify.app/.netlify/functions/proposal", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ instruction })
  });

  const data = await response.json();
  if(data.error){ alert(data.error); return; }

  const proposalData = data.proposal;
  const doc = new jsPDF();
  let y=60;

  let img = new Image(); img.src=logoUrl; img.crossOrigin="Anonymous";
  img.onload=()=>addLogoAndContent(doc,img);
  img.onerror=()=>addContent(doc);

  function addLogoAndContent(doc,imgObj){ doc.addImage(imgObj,'PNG',150,10,40,40); addContent(doc);}
  function addContent(doc){
    doc.setFont("Helvetica","bold"); doc.setFontSize(24); doc.text("PROJECT PROPOSAL",20,y); y+=15;
    doc.setFont("Helvetica","normal"); doc.setFontSize(12);
    doc.text("Proposal Number: "+proposalNumber,20,y); y+=10;
    doc.text("Date: "+proposalDate,20,y); y+=10;
    doc.text("Client: "+client,20,y); y+=10;
    doc.text("Project Title: "+projectTitle,20,y); y+=15;

    function addSection(title,content){
      doc.setFont("Helvetica","bold"); doc.text(title,20,y); y+=8;
      doc.setFont("Helvetica","normal"); let splitText=doc.splitTextToSize(content,170);
      doc.text(splitText,20,y); y+=splitText.length*10+5;
    }

    addSection("Project Details:",proposalData.projectDetails);
    addSection("Scope of Work:",proposalData.scope);
    addSection("Timeline:",proposalData.timeline);
    addSection("Terms & Conditions:",proposalData.terms);
    if(proposalData.additionalNotes) addSection("Additional Notes:",proposalData.additionalNotes);

    doc.setFont("Helvetica","bold"); doc.setFontSize(14); doc.text("Total Price: "+price,20,y+10);
    doc.save("Proposal-"+client+".pdf");
    document.getElementById("status").innerText="Proposal generated successfully!";
  }
}
</script>

</body>
</html>
