<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PNG AI Proposal Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#eef2f7; }
.container {
width:750px;
margin:40px auto;
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
h2 { text-align:center; }
input, textarea, select {
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}
button {
width:100%;
padding:15px;
margin-top:20px;
background:#002b5c;
color:#fff;
border:none;
font-size:16px;
}
#status { margin-top:10px; }
</style>
</head>

<body>

<div class="container">
<h2>AI Proposal Generator (PNG)</h2>

<input id="client" placeholder="Client Name">
<input id="title" placeholder="Project Title">
<textarea id="instruction" placeholder="Describe project (e.g. Solar project for National Parliament PNG)"></textarea>

<select id="price">
<option value="1500">PGK 1,500</option>
<option value="3500">PGK 3,500</option>
<option value="7000">PGK 7,000</option>
</select>

<button onclick="generate()">Generate Proposal</button>

<p id="status"></p>
</div>

<script>
async function generate(){

const { jsPDF } = window.jspdf;

let client = document.getElementById("client").value;
let title = document.getElementById("title").value;
let instruction = document.getElementById("instruction").value;
let price = document.getElementById("price").value;

if(!client || !title || !instruction){
alert("Fill all fields"); return;
}

document.getElementById("status").innerText="Generating proposal...";

// 🔴 PUT YOUR NETLIFY FUNCTION URL HERE 🔴
const API = "https://YOUR-SITE.netlify.app/.netlify/functions/proposal";

try {

const res = await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({ instruction })
});

const data = await res.json();

if(data.error){
alert(data.error);
document.getElementById("status").innerText="Error occurred";
return;
}

const p = data.proposal;

const doc = new jsPDF();
let y=20;

doc.setFontSize(18);
doc.text("PROJECT PROPOSAL",20,y);

y+=10;
doc.setFontSize(12);

doc.text("Client: "+client,20,y); y+=8;
doc.text("Project: "+title,20,y); y+=10;

function section(title,text){
doc.text(title,20,y); y+=6;
let lines = doc.splitTextToSize(text,170);
doc.text(lines,20,y);
y += lines.length*6 + 4;
}

section("Project Details:", p.projectDetails);
section("Scope of Work:", p.scope);
section("Timeline:", p.timeline);
section("Terms & Conditions:", p.terms);
section("Additional Notes:", p.additionalNotes);

doc.text("Total Price: PGK "+price,20,y+10);

doc.save("Proposal-"+client+".pdf");

document.getElementById("status").innerText="Proposal generated successfully";

} catch (err) {

alert("Failed to connect to AI");
document.getElementById("status").innerText="Connection failed";

}
}
</script>

</body>
</html>
